<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraKnow | Painel Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-tabs { display: flex; gap: 20px; margin-top: 40px; margin-bottom: 30px; }
        .tab-btn { padding: 15px 30px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-dim); border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .admin-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid var(--glass-border); }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
        .status-active { background: #2ecc71; color: white; }
        .status-blocked { background: #e74c3c; color: white; }
        .action-btn { background: none; border: 1px solid var(--primary); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; margin-right: 5px; }
        .action-btn.danger { border-color: #e74c3c; color: #e74c3c; }
        .action-btn.success { border-color: #2ecc71; color: #2ecc71; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 8px; font-size: 1rem; }
        
        /* Hierarquia visual V3 */
        .subject-box { background: rgba(153, 102, 204, 0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(153, 102, 204, 0.2); margin-top: 20px; }
        .module-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); margin-top: 15px; margin-left: 20px; }
        .lesson-list-item { background: rgba(255,255,255,0.02); padding: 8px 12px; border-radius: 8px; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; margin-left: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-dark); border: 1px solid var(--glass-border); padding: 40px; border-radius: 24px; width: 600px; max-width: 90%; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <!-- MODAL DE EDIÇÃO/CRIAÇÃO DE AULA -->
    <div id="lessonModal" class="modal">
        <div class="modal-content glass">
            <h3 id="modalTitle">Aula</h3>
            <input type="hidden" id="modalLessonId">
            <label style="font-size: 0.8rem; color: var(--primary); display: block; margin-bottom: 5px;">Módulo de Destino:</label>
            <select id="modalModuleSelect"></select>
            <input type="text" id="modalLessonTitle" placeholder="Título da Aula">
            <input type="text" id="modalLessonVideo" placeholder="URL do Vídeo">
            <textarea id="modalLessonContent" placeholder="Conteúdo da Aula" style="height: 200px;"></textarea>
            <input type="number" id="modalLessonOrder" placeholder="Ordem">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-primary" onclick="saveLesson()" style="flex: 1;">Salvar</button>
                <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <header class="container"><nav><a href="index.html" class="logo">Aura<span>Know</span> Admin</a><button onclick="logout()" class="btn-secondary">Sair</button></nav></header>

    <main class="container">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showSection('users')">Alunos</button>
            <button class="tab-btn" onclick="showSection('courses')">Conteúdo (V3)</button>
        </div>

        <div id="usersSection" class="admin-section active">
            <div class="admin-grid">
                <div class="glass" style="padding: 40px;"><h3>Novo Aluno</h3><form id="createUserForm"><input type="text" id="newName" placeholder="Nome" required><input type="email" id="newEmail" placeholder="E-mail" required><input type="password" id="newPassword" placeholder="Senha" required><select id="newRole"><option value="student">Aluno</option><option value="admin">Admin</option></select><button type="submit" class="btn-primary" style="width: 100%;">Criar</button></form></div>
                <div class="glass" style="padding: 40px;"><h3>Alunos</h3><table><thead><tr><th>Nome</th><th>Status</th><th>Ações</th></tr></thead><tbody id="userList"></tbody></table></div>
            </div>
        </div>

        <div id="coursesSection" class="admin-section">
            <div class="admin-grid">
                <div class="glass" style="padding: 40px;">
                    <h3>Novo Curso</h3>
                    <form id="createCourseForm"><input type="text" id="courseTitleInput" placeholder="Nome do Curso" required><button type="submit" class="btn-primary" style="width: 100%;">Criar</button></form>
                    <hr style="opacity: 0.1; margin: 40px 0;">
                    <h3>Matrícula</h3>
                    <form id="enrollForm"><select id="enrollStudent" required></select><select id="enrollCourse" required></select><button type="submit" class="btn-primary" style="width: 100%;">Matricular</button></form>
                </div>
                <div class="glass" style="padding: 40px;">
                    <h3>Gestão Hierárquica</h3>
                    <div id="courseManagementList"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let allModules = [];

        function showSection(section) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(section + 'Section').classList.add('active');
            event.target.classList.add('active');
        }

        async function checkAdmin() {
            const res = await fetch('/api/me');
            if (!res.ok) window.location.href = 'login.html';
        }
        checkAdmin();

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const list = document.getElementById('userList');
            const enrollStudent = document.getElementById('enrollStudent');
            list.innerHTML = '';
            enrollStudent.innerHTML = '<option value="">Selecionar Aluno</option>';
            users.forEach(u => {
                if (u.email === 'admin@auraknow.com') return;
                list.innerHTML += `<tr><td>${u.name}</td><td><span class="status-badge ${u.isActive?'status-active':'status-blocked'}">${u.isActive?'Ativo':'Bloq'}</span></td>
                <td><button class="action-btn" onclick="toggleStatus('${u.id}')">Status</button><button class="action-btn danger" onclick="deleteUser('${u.id}')">X</button></td></tr>`;
                enrollStudent.innerHTML += `<option value="${u.id}">${u.name}</option>`;
            });
        }

        async function toggleStatus(userId) { await fetch('/api/admin/toggle-status', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId})}); loadUsers(); }
        async function deleteUser(userId) { if(confirm('Apagar?')) { await fetch('/api/admin/delete-user', {method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId})}); loadUsers(); } }

        document.getElementById('createUserForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/admin/create-user', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:document.getElementById('newName').value, email:document.getElementById('newEmail').value, password:document.getElementById('newPassword').value, role:document.getElementById('newRole').value})});
            loadUsers();
        };

        async function loadCourses() {
            const res = await fetch('/api/courses');
            const courses = await res.json();
            const manageList = document.getElementById('courseManagementList');
            const enrollCourse = document.getElementById('enrollCourse');
            
            manageList.innerHTML = '';
            enrollCourse.innerHTML = '<option value="">Selecionar Curso</option>';
            allModules = [];

            for (const c of courses) {
                const courseDiv = document.createElement('div');
                courseDiv.className = 'glass';
                courseDiv.style.padding = '20px';
                courseDiv.style.marginBottom = '30px';
                courseDiv.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">
                        <h3 style="margin: 0; color: var(--primary); font-size: 1.2rem;">${c.title}</h3>
                        <div>
                            <button class="action-btn success" onclick="createSubject('${c.id}')">+ Matéria</button>
                            <button class="action-btn" onclick="editCourse('${c.id}', '${c.title}')">Renomear</button>
                            <button class="action-btn danger" onclick="deleteCourse('${c.id}')">X</button>
                        </div>
                    </div>
                    <div id="orphans-${c.id}"></div>
                    <div id="subjects-${c.id}"></div>`;
                manageList.appendChild(courseDiv);
                enrollCourse.innerHTML += `<option value="${c.id}">${c.title}</option>`;

                // BUSCAR ÓRFÃOS (Módulos e Aulas sem pai V3)
                const orphanModRes = await fetch(`/api/courses/${c.id}/orphan-modules`);
                const orphanMods = await orphanModRes.json();
                const orphanLessRes = await fetch(`/api/courses/${c.id}/orphan-lessons`);
                const orphanLess = await orphanLessRes.json();
                const orphanContainer = document.getElementById(`orphans-${c.id}`);

                if(orphanMods.length > 0 || orphanLess.length > 0) {
                    orphanContainer.innerHTML = '<div style="margin-top:15px; color:#ff9f43; font-size:0.8rem; border: 1px dashed #ff9f43; padding:10px; border-radius:10px;">⚠️ Conteúdo Legado (Mova para uma Matéria/Módulo)</div>';
                    orphanMods.forEach(m => {
                        orphanContainer.innerHTML += `<div class="module-box" style="border-color:#ff9f43;"><span>Módulo: ${m.title}</span> <button class="action-btn" onclick="moveModule('${m.id}', '${c.id}')">Vincular Matéria</button></div>`;
                    });
                    orphanLess.forEach(l => {
                        orphanContainer.innerHTML += `<div class="lesson-list-item" style="border-color:#ff9f43;"><span>Aula: ${l.title}</span> <button class="action-btn" onclick="openModal('edit', '${l.id}', null, '${l.title}', '${l.video_url || ''}', \`${l.content || ''}\`, '${l.order}')">Mover</button></div>`;
                    });
                }

                // MATÉRIAS
                const sRes = await fetch(`/api/courses/${c.id}/subjects`);
                const subjects = await sRes.json();
                const sContainer = document.getElementById(`subjects-${c.id}`);

                for (const s of subjects) {
                    const sBox = document.createElement('div');
                    sBox.className = 'subject-box';
                    sBox.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h4 style="margin: 0; color: #9b59b6;">📖 ${s.title}</h4>
                            <div>
                                <button class="action-btn success" onclick="createModule('${s.id}')">+ Módulo</button>
                                <button class="action-btn danger" onclick="deleteSubject('${s.id}')">X</button>
                            </div>
                        </div>
                        <div id="modules-${s.id}"></div>`;
                    sContainer.appendChild(sBox);

                    // MÓDULOS
                    const mRes = await fetch(`/api/subjects/${s.id}/modules`);
                    const modules = await mRes.json();
                    const mContainer = document.getElementById(`modules-${s.id}`);
                    for (const m of modules) {
                        allModules.push({ id: m.id, title: m.title, subject: s.title, course: c.title });
                        const mBox = document.createElement('div');
                        mBox.className = 'module-box';
                        mBox.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <h4 style="margin: 0;">📦 ${m.title}</h4>
                                <div>
                                    <button class="action-btn success" onclick="openModal('create', null, '${m.id}')">+ Aula</button>
                                    <button class="action-btn danger" onclick="deleteModule('${m.id}')">X</button>
                                </div>
                            </div>
                            <div id="lessons-${m.id}"></div>`;
                        mContainer.appendChild(mBox);

                        // AULAS
                        const lRes = await fetch(`/api/modules/${m.id}/lessons`);
                        const lessons = await lRes.json();
                        const lContainer = document.getElementById(`lessons-${m.id}`);
                        lessons.forEach(l => {
                            const lDiv = document.createElement('div');
                            lDiv.className = 'lesson-list-item';
                            lDiv.innerHTML = `<span>${l.order}. ${l.title}</span>
                                <div>
                                    <button class="action-btn" onclick="openModal('edit', '${l.id}', '${m.id}', '${l.title}', '${l.video_url || ''}', \`${l.content || ''}\`, '${l.order}')">Editar</button>
                                    <button class="action-btn danger" onclick="deleteLesson('${l.id}')">X</button>
                                </div>`;
                            lContainer.appendChild(lDiv);
                        });
                    }
                }
            }
        }

        // --- GESTÃO DE MATÉRIAS ---
        async function createSubject(courseId) {
            const title = prompt('Nome da Matéria (ex: Geografia):');
            if(!title) return;
            await fetch('/api/admin/subjects', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({course_id:courseId, title, order:1})});
            loadCourses();
        }
        async function deleteSubject(id) { if(confirm('Apagar Matéria?')) { await fetch(`/api/admin/subjects/${id}`, {method:'DELETE'}); loadCourses(); } }

        // --- GESTÃO DE MÓDULOS ---
        async function createModule(subjectId) {
            const title = prompt('Nome do Módulo:');
            if(!title) return;
            await fetch('/api/admin/modules', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({subject_id:subjectId, title, order:1})});
            loadCourses();
        }
        async function deleteModule(id) { if(confirm('Apagar módulo?')) { await fetch(`/api/admin/modules/${id}`, {method:'DELETE'}); loadCourses(); } }
        async function moveModule(moduleId, courseId) {
            const res = await fetch(`/api/courses/${courseId}/subjects`);
            const subjects = await res.json();
            if(subjects.length === 0) { alert('Crie uma Matéria primeiro!'); return; }
            const sId = prompt('ID da Matéria para mover:\n' + subjects.map(s => `${s.id}: ${s.title}`).join('\n'));
            if(sId) {
                await fetch('/api/admin/modules', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id: moduleId, subject_id: sId})}); // Note: should use PUT in real API
                loadCourses();
            }
        }

        // --- MODAL AULAS ---
        function openModal(mode, lessonId, moduleId, title='', url='', content='', order='1') {
            document.getElementById('modalTitle').textContent = mode === 'create' ? 'Nova Aula' : 'Editar Aula';
            document.getElementById('modalLessonId').value = lessonId || '';
            const select = document.getElementById('modalModuleSelect');
            select.innerHTML = '<option value="">Sem Módulo (Legado)</option>';
            allModules.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = `[${m.subject}] - ${m.title}`;
                if(m.id === moduleId) opt.selected = true;
                select.appendChild(opt);
            });
            document.getElementById('modalLessonTitle').value = title;
            document.getElementById('modalLessonVideo').value = url;
            document.getElementById('modalLessonContent').value = content;
            document.getElementById('modalLessonOrder').value = order;
            document.getElementById('lessonModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('lessonModal').style.display = 'none'; }
        async function saveLesson() {
            const id = document.getElementById('modalLessonId').value;
            const payload = {
                module_id: document.getElementById('modalModuleSelect').value || null,
                title: document.getElementById('modalLessonTitle').value,
                video_url: document.getElementById('modalLessonVideo').value,
                content: document.getElementById('modalLessonContent').value,
                order: document.getElementById('modalLessonOrder').value
            };
            const url = id ? `/api/admin/lessons/${id}` : '/api/admin/lessons';
            const method = id ? 'PUT' : 'POST';
            await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            closeModal(); loadCourses();
        }
        async function deleteLesson(id) { if(confirm('Apagar aula?')) { await fetch(`/api/admin/lessons/${id}`, { method: 'DELETE' }); loadCourses(); } }

        // --- GESTÃO CURSOS ---
        async function editCourse(id, oldTitle) { const title = prompt('Novo nome:', oldTitle); if (title) { await fetch(`/api/admin/courses/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ title }) }); loadCourses(); } }
        async function deleteCourse(id) { if (confirm('Apagar curso?')) { await fetch(`/api/admin/courses/${id}`, { method: 'DELETE' }); loadCourses(); } }

        document.getElementById('createCourseForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/admin/courses', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title:document.getElementById('courseTitleInput').value})});
            document.getElementById('createCourseForm').reset();
            loadCourses();
        };
        document.getElementById('enrollForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/admin/enroll', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:document.getElementById('enrollStudent').value, course_id:document.getElementById('enrollCourse').value})});
            alert('Matriculado!');
        };
        async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href = 'login.html'; }
        loadUsers();
        loadCourses();
    </script>
</body>
</html>
