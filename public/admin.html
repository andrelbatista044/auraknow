<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraKnow | Painel Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-tabs {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            margin-bottom: 30px;
        }
        .tab-btn {
            padding: 15px 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .admin-section {
            display: none;
        }
        .admin-section.active {
            display: block;
        }
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        /* Classes de status corrigidas para evitar conflito */
        .status-active { background: #2ecc71; color: white; }
        .status-blocked { background: #e74c3c; color: white; }
        
        .action-btn {
            background: none;
            border: 1px solid var(--primary);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <header class="container">
        <nav>
            <a href="index.html" class="logo">Aura<span>Know</span> Admin</a>
            <button onclick="logout()" class="btn-secondary">Sair</button>
        </nav>
    </header>

    <main class="container">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showSection('users')">Alunos</button>
            <button class="tab-btn" onclick="showSection('courses')">Cursos & Aulas</button>
        </div>

        <!-- SEÇÃO DE USUÁRIOS -->
        <div id="usersSection" class="admin-section active">
            <div class="admin-grid">
                <div class="glass" style="padding: 40px;">
                    <h3>Novo Aluno</h3>
                    <form id="createUserForm" style="margin-top: 20px;">
                        <input type="text" id="newName" placeholder="Nome Completo" required>
                        <input type="email" id="newEmail" placeholder="E-mail" required>
                        <input type="password" id="newPassword" placeholder="Senha Temporária" required>
                        <select id="newRole">
                            <option value="student">Aluno</option>
                            <option value="admin">Administrador</option>
                        </select>
                        <button type="submit" class="btn-primary" style="width: 100%;">Cadastrar</button>
                    </form>
                </div>
                <div class="glass" style="padding: 40px;">
                    <h3>Usuários Cadastrados</h3>
                    <table id="userTable">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="userList"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- SEÇÃO DE CURSOS -->
        <div id="coursesSection" class="admin-section">
            <div class="admin-grid">
                <div class="glass" style="padding: 40px;">
                    <h3>Novo Curso</h3>
                    <form id="createCourseForm" style="margin-top: 20px;">
                        <input type="text" id="courseTitle" placeholder="Título do Curso" required>
                        <textarea id="courseDesc" placeholder="Descrição"></textarea>
                        <input type="text" id="courseThumb" placeholder="URL da Thumbnail">
                        <button type="submit" class="btn-primary" style="width: 100%;">Criar Curso</button>
                    </form>

                    <h3 style="margin-top: 40px;">Nova Aula</h3>
                    <form id="createLessonForm" style="margin-top: 20px;">
                        <select id="lessonCourse" required>
                            <option value="">Selecione o Curso</option>
                        </select>
                        <input type="text" id="lessonTitle" placeholder="Título da Aula" required>
                        <input type="text" id="lessonVideo" placeholder="URL do Vídeo (YouTube/Vimeo)">
                        <input type="number" id="lessonOrder" placeholder="Ordem" value="1">
                        <button type="submit" class="btn-primary" style="width: 100%;">Adicionar Aula</button>
                    </form>
                </div>
                <div class="glass" style="padding: 40px;">
                    <h3>Matricular Aluno em Curso</h3>
                    <form id="enrollForm" style="margin-top: 20px; display: flex; gap: 10px;">
                        <select id="enrollStudent" required></select>
                        <select id="enrollCourse" required></select>
                        <button type="submit" class="btn-primary" style="padding: 0 30px;">Matricular</button>
                    </form>

                    <h3 style="margin-top: 50px;">Cursos Disponíveis</h3>
                    <table id="courseTable">
                        <thead>
                            <tr>
                                <th>Título</th>
                                <th>Alunos</th>
                                <th>Aulas</th>
                            </tr>
                        </thead>
                        <tbody id="courseList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- NAVEGAÇÃO ENTRE TABS ---
        function showSection(section) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(section + 'Section').classList.add('active');
            event.target.classList.add('active');
        }

        // --- GESTÃO DE USUÁRIOS ---
        async function checkAdmin() {
            try {
                const res = await fetch('/api/me');
                if (!res.ok) { window.location.href = 'login.html'; return; }
                const user = await res.json();
                if (user.role !== 'admin') window.location.href = 'login.html';
            } catch (e) { window.location.href = 'login.html'; }
        }
        checkAdmin();

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const list = document.getElementById('userList');
            const enrollStudentSelect = document.getElementById('enrollStudent');
            list.innerHTML = '';
            enrollStudentSelect.innerHTML = '<option value="">Selecionar Aluno</option>';
            
            users.forEach(user => {
                if (user.email === 'admin@auraknow.com') return;
                
                const tr = document.createElement('tr');
                // USANDO AS NOVAS CLASSES DE STATUS AQUI
                tr.innerHTML = `
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td><span class="status-badge ${user.isActive ? 'status-active' : 'status-blocked'}">${user.isActive ? 'Ativo' : 'Bloqueado'}</span></td>
                    <td>
                        <button class="action-btn" onclick="toggleStatus('${user.id}')">${user.isActive ? 'Bloquear' : 'Ativar'}</button>
                        <button class="action-btn" onclick="resetPassword('${user.id}')">Senha</button>
                        <button class="action-btn" onclick="deleteUser('${user.id}')" style="border-color: #ff4d4d; color: #ff4d4d;">X</button>
                    </td>
                `;
                list.appendChild(tr);

                const opt = document.createElement('option');
                opt.value = user.id;
                opt.textContent = user.name;
                enrollStudentSelect.appendChild(opt);
            });
        }

        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('newName').value,
                email: document.getElementById('newEmail').value,
                password: document.getElementById('newPassword').value,
                role: document.getElementById('newRole').value
            };
            const res = await fetch('/api/admin/create-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (res.ok) { alert('Usuário criado!'); loadUsers(); }
        });

        async function toggleStatus(userId) {
            await fetch('/api/admin/toggle-status', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
            loadUsers();
        }

        async function resetPassword(userId) {
            const newPassword = prompt('Nova senha:');
            if (!newPassword) return;
            await fetch('/api/admin/reset-password', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId, newPassword }) });
            alert('Senha alterada!');
        }

        async function deleteUser(userId) {
            if (!confirm('Deseja apagar?')) return;
            await fetch('/api/admin/delete-user', { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
            loadUsers();
        }

        async function loadCourses() {
            const res = await fetch('/api/courses');
            const courses = await res.json();
            const list = document.getElementById('courseList');
            const lessonSelect = document.getElementById('lessonCourse');
            const enrollCourseSelect = document.getElementById('enrollCourse');
            
            list.innerHTML = '';
            lessonSelect.innerHTML = '<option value="">Selecione o Curso</option>';
            enrollCourseSelect.innerHTML = '<option value="">Selecionar Curso</option>';

            courses.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${c.title}</td><td>-</td><td>-</td>`;
                list.appendChild(tr);

                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.title;
                lessonSelect.appendChild(opt);
                
                const opt2 = opt.cloneNode(true);
                enrollCourseSelect.appendChild(opt2);
            });
        }

        document.getElementById('createCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('courseTitle').value,
                description: document.getElementById('courseDesc').value,
                thumbnail: document.getElementById('courseThumb').value
            };
            await fetch('/api/admin/courses', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert('Curso criado!');
            loadCourses();
        });

        document.getElementById('createLessonForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                course_id: document.getElementById('lessonCourse').value,
                title: document.getElementById('lessonTitle').value,
                video_url: document.getElementById('lessonVideo').value,
                order: document.getElementById('lessonOrder').value
            };
            await fetch('/api/admin/lessons', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert('Aula adicionada!');
        });

        document.getElementById('enrollForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                user_id: document.getElementById('enrollStudent').value,
                course_id: document.getElementById('enrollCourse').value
            };
            const res = await fetch('/api/admin/enroll', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            if (res.ok) alert('Aluno matriculado!'); else alert('Erro na matrícula');
        });

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = 'login.html';
        }

        loadUsers();
        loadCourses();
    </script>
</body>
</html>
