<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraKnow | Painel Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-tabs { display: flex; gap: 20px; margin-top: 40px; margin-bottom: 30px; }
        .tab-btn { padding: 15px 30px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-dim); border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .admin-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid var(--glass-border); }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
        .status-active { background: #2ecc71; color: white; }
        .status-blocked { background: #e74c3c; color: white; }
        .action-btn { background: none; border: 1px solid var(--primary); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; margin-right: 5px; }
        .action-btn.danger { border-color: #e74c3c; color: #e74c3c; }
        .action-btn.success { border-color: #2ecc71; color: #2ecc71; }
        .action-btn.info { border-color: #3498db; color: #3498db; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 8px; font-size: 1rem; }
        
        .subject-box { background: rgba(153, 102, 204, 0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(153, 102, 204, 0.2); margin-top: 20px; }
        .module-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); margin-top: 15px; margin-left: 20px; }
        .lesson-list-item { background: rgba(255,255,255,0.02); padding: 8px 12px; border-radius: 8px; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; margin-left: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-dark); border: 1px solid var(--glass-border); padding: 40px; border-radius: 24px; width: 800px; max-width: 90%; max-height: 90vh; overflow-y: auto; }
        .question-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <!-- MODAL DE PROVA -->
    <div id="quizModal" class="modal">
        <div class="modal-content glass">
            <h3>Criar Avaliação do Módulo</h3>
            <input type="hidden" id="quizModuleId">
            <input type="text" id="quizTitle" placeholder="Título da Prova">
            <input type="number" id="quizPassingScore" placeholder="Nota de Corte (70)">
            <div id="questionsContainer"></div>
            <button class="action-btn success" onclick="addQuestion()">+ Questão</button>
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button class="btn-primary" onclick="saveQuiz()" style="flex: 1;">Criar Prova</button>
                <button class="btn-secondary" onclick="closeModals()">Cancelar</button>
            </div>
        </div>
    </div>

    <header class="container"><nav><a href="index.html" class="logo">Aura<span>Know</span> Admin</a><button onclick="logout()" class="btn-secondary">Sair</button></nav></header>

    <main class="container">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showSection('users')">Alunos</button>
            <button class="tab-btn" onclick="showSection('courses')">Conteúdo</button>
            <button class="tab-btn" onclick="showSection('results')">Boletim Geral</button>
        </div>

        <!-- SEÇÃO ALUNOS -->
        <div id="usersSection" class="admin-section active">
            <div class="admin-grid">
                <div class="glass" style="padding: 40px;"><h3>Novo Aluno</h3><form id="createUserForm"><input type="text" id="newName" placeholder="Nome" required><input type="email" id="newEmail" placeholder="E-mail" required><input type="password" id="newPassword" placeholder="Senha" required><button type="submit" class="btn-primary" style="width: 100%;">Criar</button></form></div>
                <div class="glass" style="padding: 40px;"><h3>Alunos Cadastrados</h3><table><thead><tr><th>Nome</th><th>Status</th><th>Ações</th></tr></thead><tbody id="userList"></tbody></table></div>
            </div>
        </div>

        <!-- SEÇÃO CONTEÚDO -->
        <div id="coursesSection" class="admin-section">
            <div class="admin-grid">
                <div class="glass" style="padding: 40px;"><h3>Novo Curso</h3><form id="createCourseForm"><input type="text" id="courseTitleInput" placeholder="Nome do Curso" required><button type="submit" class="btn-primary" style="width: 100%;">Criar</button></form><hr style="opacity: 0.1; margin: 40px 0;"><h3>Matrícula</h3><form id="enrollForm"><select id="enrollStudent" required></select><select id="enrollCourse" required></select><button type="submit" class="btn-primary" style="width: 100%;">Matricular</button></form></div>
                <div class="glass" style="padding: 40px;"><h3>Gestão de Conteúdo</h3><div id="courseManagementList"></div></div>
            </div>
        </div>

        <!-- SEÇÃO RESULTADOS (BOLETIM) -->
        <div id="resultsSection" class="admin-section">
            <div class="glass" style="padding: 40px;">
                <h3>Resultados das Avaliações</h3>
                <p style="color: var(--text-dim); margin-bottom: 20px;">Acompanhe o desempenho de todos os alunos.</p>
                <table id="resultsTable">
                    <thead><tr><th>Aluno</th><th>Prova</th><th>Nota</th><th>Status</th><th>Data</th></tr></thead>
                    <tbody id="resultsList"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let cachedSubjects = []; let cachedModules = [];

        function showSection(section) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(section + 'Section').classList.add('active');
            event.target.classList.add('active');
            if (section === 'results') loadAllResults();
        }

        async function loadAllResults() {
            // Em um sistema real, o admin precisa de uma rota especial. Vou usar a mesma mas o server vai tratar.
            const res = await fetch('/api/admin/all-results'); // Vou criar essa rota agora
            const results = await res.json();
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            results.forEach(r => {
                list.innerHTML += `<tr>
                    <td>${r.users.name}</td>
                    <td>${r.quizzes.title}</td>
                    <td>${r.score}%</td>
                    <td><span class="status-badge ${r.passed?'status-active':'status-blocked'}">${r.passed?'Aprovado':'Reprovado'}</span></td>
                    <td>${new Date(r.completed_at).toLocaleDateString()}</td>
                </tr>`;
            });
        }

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const list = document.getElementById('userList');
            const enrollStudent = document.getElementById('enrollStudent');
            list.innerHTML = ''; enrollStudent.innerHTML = '<option value="">Selecionar Aluno</option>';
            users.forEach(u => {
                if (u.email === 'admin@auraknow.com') return;
                list.innerHTML += `<tr><td>${u.name}</td><td><span class="status-badge ${u.isActive?'status-active':'status-blocked'}">${u.isActive?'Ativo':'Bloq'}</span></td>
                <td><button class="action-btn" onclick="toggleStatus('${u.id}')">Status</button><button class="action-btn danger" onclick="deleteUser('${u.id}')">X</button></td></tr>`;
                enrollStudent.innerHTML += `<option value="${u.id}">${u.name}</option>`;
            });
        }

        async function loadCourses() {
            const res = await fetch('/api/courses');
            const courses = await res.json();
            const manageList = document.getElementById('courseManagementList');
            const enrollCourse = document.getElementById('enrollCourse');
            manageList.innerHTML = ''; enrollCourse.innerHTML = '<option value="">Selecionar Curso</option>';
            cachedSubjects = []; cachedModules = [];

            for (const c of courses) {
                const courseDiv = document.createElement('div');
                courseDiv.className = 'glass'; courseDiv.style.padding = '20px'; courseDiv.style.marginBottom = '30px';
                courseDiv.innerHTML = `<div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">
                        <h3 style="margin: 0; color: var(--primary);">${c.title}</h3>
                        <div><button class="action-btn success" onclick="openSubjectModal('create', '${c.id}')">+ Matéria</button><button class="action-btn" onclick="editCourse('${c.id}', '${c.title}')">Renomear</button><button class="action-btn danger" onclick="deleteCourse('${c.id}')">X</button></div>
                    </div><div id="subjects-${c.id}"></div>`;
                manageList.appendChild(courseDiv);
                enrollCourse.innerHTML += `<option value="${c.id}">${c.title}</option>`;

                const sRes = await fetch(`/api/courses/${c.id}/subjects`);
                const subjects = await sRes.json();
                const sCont = document.getElementById(`subjects-${c.id}`);

                for (const s of subjects) {
                    cachedSubjects.push({ id: s.id, title: s.title, course: c.title });
                    const sDiv = document.createElement('div');
                    sDiv.className = 'subject-box';
                    sDiv.innerHTML = `<div style="display: flex; justify-content: space-between; align-items: center;"><h4 style="margin: 0; color: #9b59b6;">📖 ${s.title}</h4>
                        <div><button class="action-btn success" onclick="openModuleModal('create', null, '${s.id}')">+ Módulo</button><button class="action-btn danger" onclick="deleteSubject('${s.id}')">X</button></div></div><div id="modules-${s.id}"></div>`;
                    sCont.appendChild(sDiv);

                    const mRes = await fetch(`/api/subjects/${s.id}/modules`);
                    const modules = await mRes.json();
                    const mCont = document.getElementById(`modules-${s.id}`);
                    for (const m of modules) {
                        cachedModules.push({ id: m.id, title: m.title, subject: s.title });
                        const mDiv = document.createElement('div');
                        mDiv.className = 'module-box';
                        mDiv.innerHTML = `<div style="display: flex; justify-content: space-between; align-items: center;"><strong>📦 ${m.title}</strong>
                                <div><button class="action-btn info" onclick="openQuizModal('${m.id}')">+ Prova</button><button class="action-btn success" onclick="openLessonModal('create', null, '${m.id}')">+ Aula</button><button class="action-btn danger" onclick="deleteModule('${m.id}')">X</button></div></div><div id="lessons-${m.id}"></div>`;
                        mCont.appendChild(mDiv);

                        const lRes = await fetch(`/api/modules/${m.id}/lessons`);
                        const lessons = await lRes.json();
                        const lCont = document.getElementById(`lessons-${m.id}`);
                        lessons.forEach(l => {
                            lCont.innerHTML += `<div class="lesson-list-item"><span>${l.order}. ${l.title}</span><div><button class="action-btn" onclick="openLessonModal('edit', '${l.id}', '${m.id}', '${l.title}', '${l.video_url||''}', \`${l.content||''}\`, '${l.order}')">Editar</button><button class="action-btn danger" onclick="deleteLesson('${l.id}')">X</button></div></div>`;
                        });
                    }
                }
            }
        }

        // --- GESTÃO DE PROVAS ---
        function openQuizModal(moduleId) {
            document.getElementById('quizModuleId').value = moduleId;
            document.getElementById('questionsContainer').innerHTML = '';
            addQuestion();
            document.getElementById('quizModal').style.display = 'flex';
        }
        function addQuestion() {
            const container = document.getElementById('questionsContainer');
            const qCount = container.children.length + 1;
            const qDiv = document.createElement('div');
            qDiv.className = 'question-card';
            qDiv.innerHTML = `<h4>Questão ${qCount}</h4>
                <input type="text" placeholder="Enunciado" class="q-text">
                <input type="text" placeholder="Opção 1" class="q-opt"><input type="text" placeholder="Opção 2" class="q-opt">
                <input type="text" placeholder="Opção 3" class="q-opt"><input type="text" placeholder="Opção 4" class="q-opt">
                <select class="q-correct"><option value="0">Opção 1 correta</option><option value="1">Opção 2 correta</option><option value="2">Opção 3 correta</option><option value="3">Opção 4 correta</option></select>`;
            container.appendChild(qDiv);
        }
        async function saveQuiz() {
            const questions = [];
            document.querySelectorAll('.question-card').forEach((card, index) => {
                const options = Array.from(card.querySelectorAll('.q-opt')).map(i => i.value).filter(v => v !== '');
                questions.push({ text: card.querySelector('.q-text').value, options: options, correct_option: parseInt(card.querySelector('.q-correct').value), order: index + 1 });
            });
            await fetch('/api/admin/quizzes', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ module_id: document.getElementById('quizModuleId').value, title: document.getElementById('quizTitle').value, passing_score: parseInt(document.getElementById('quizPassingScore').value), questions: questions }) });
            alert('Prova Criada!'); closeModals();
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = 'login.html'; }
        loadUsers(); loadCourses();
    </script>
</body>
</html>
