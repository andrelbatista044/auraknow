<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraKnow | Painel Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
            margin-top: 50px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .active { background: #2ecc71; color: white; }
        .blocked { background: #e74c3c; color: white; }
        .action-btn {
            background: none;
            border: 1px solid var(--primary);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <header class="container">
        <nav>
            <a href="index.html" class="logo">Aura<span>Know</span> Admin</a>
            <button onclick="logout()" class="btn-secondary">Sair</button>
        </nav>
    </header>

    <main class="container">
        <h1 style="margin-top: 40px;">Gestão de Alunos</h1>
        
        <div class="admin-grid">
            <!-- Create User -->
            <div class="glass" style="padding: 40px;">
                <h3>Novo Aluno</h3>
                <form id="createUserForm" style="margin-top: 20px;">
                    <input type="text" id="newName" placeholder="Nome Completo" required>
                    <input type="email" id="newEmail" placeholder="E-mail" required>
                    <input type="password" id="newPassword" placeholder="Senha Temporária" required>
                    <select id="newRole">
                        <option value="student">Aluno</option>
                        <option value="admin">Administrador</option>
                    </select>
                    <button type="submit" class="btn-primary" style="width: 100%;">Cadastrar</button>
                </form>
            </div>

            <!-- List Users -->
            <div class="glass" style="padding: 40px;">
                <h3>Usuários Cadastrados</h3>
                <table id="userTable">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="userList">
                        <!-- Carregado via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Verifica se é admin
        async function checkAdmin() {
            try {
                const res = await fetch('/api/me');
                if (!res.ok) {
                    window.location.href = 'login.html';
                    return;
                }
                const user = await res.json();
                if (user.role !== 'admin') {
                    window.location.href = 'login.html';
                }
            } catch (e) {
                window.location.href = 'login.html';
            }
        }
        checkAdmin();

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const list = document.getElementById('userList');
            list.innerHTML = '';
            
            users.forEach(user => {
                if (user.role === 'admin' && user.email === 'admin@auraknow.com') return; // Protege super-admin

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td><span class="status-badge ${user.isActive ? 'active' : 'blocked'}">${user.isActive ? 'Ativo' : 'Bloqueado'}</span></td>
                    <td>
                        <button class="action-btn" onclick="toggleStatus('${user.id}')" style="background: ${user.isActive ? 'rgba(231, 76, 60, 0.1)' : 'rgba(46, 204, 113, 0.1)'}">
                            ${user.isActive ? 'Bloquear' : 'Desbloquear'}
                        </button>
                        <button class="action-btn" onclick="resetPassword('${user.id}')" style="margin-left: 5px;">
                            Nova Senha
                        </button>
                        <button class="action-btn" onclick="deleteUser('${user.id}')" style="margin-left: 5px; border-color: #ff4d4d; color: #ff4d4d;">
                            Apagar
                        </button>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('newName').value,
                email: document.getElementById('newEmail').value,
                password: document.getElementById('newPassword').value,
                role: document.getElementById('newRole').value
            };

            const res = await fetch('/api/admin/create-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('Usuário criado!');
                document.getElementById('createUserForm').reset();
                loadUsers();
            } else {
                const data = await res.json();
                alert(data.error);
            }
        });

        async function toggleStatus(userId) {
            await fetch('/api/admin/toggle-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId })
            });
            loadUsers();
        }

        async function resetPassword(userId) {
            const newPassword = prompt('Digite a nova senha para este aluno:');
            if (!newPassword) return;

            const res = await fetch('/api/admin/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, newPassword })
            });

            if (res.ok) {
                alert('Senha alterada com sucesso!');
            } else {
                alert('Erro ao alterar senha.');
            }
        }

        async function deleteUser(userId) {
            if (!confirm('TEM CERTEZA? Esta ação é permanente e o aluno perderá todo o acesso.')) return;

            const res = await fetch('/api/admin/delete-user', {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId })
            });

            if (res.ok) {
                alert('Aluno removido com sucesso.');
                loadUsers();
            } else {
                const data = await res.json();
                alert(data.error || 'Erro ao remover aluno.');
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = 'login.html';
        }

        loadUsers();
    </script>
</body>
</html>
