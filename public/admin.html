<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraKnow | Painel Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-tabs { display: flex; gap: 20px; margin-top: 40px; margin-bottom: 30px; }
        .tab-btn { padding: 15px 30px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-dim); border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .admin-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid var(--glass-border); }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
        .status-active { background: #2ecc71; color: white; }
        .status-blocked { background: #e74c3c; color: white; }
        .action-btn { background: none; border: 1px solid var(--primary); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; margin-right: 5px; }
        .action-btn.danger { border-color: #e74c3c; color: #e74c3c; }
        .action-btn.success { border-color: #2ecc71; color: #2ecc71; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 8px; font-size: 1rem; }
        .lesson-list-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-dark); border: 1px solid var(--glass-border); padding: 40px; border-radius: 24px; width: 600px; max-width: 90%; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <!-- MODAL DE EDIÇÃO/CRIAÇÃO -->
    <div id="lessonModal" class="modal">
        <div class="modal-content glass">
            <h3 id="modalTitle">Aula</h3>
            <input type="hidden" id="modalLessonId">
            <input type="hidden" id="modalCourseId">
            <input type="text" id="modalLessonTitle" placeholder="Título da Aula">
            <input type="text" id="modalLessonVideo" placeholder="URL do Vídeo">
            <textarea id="modalLessonContent" placeholder="Conteúdo da Aula" style="height: 200px;"></textarea>
            <input type="number" id="modalLessonOrder" placeholder="Ordem">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-primary" onclick="saveLesson()" style="flex: 1;">Salvar</button>
                <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <header class="container"><nav><a href="index.html" class="logo">Aura<span>Know</span> Admin</a><button onclick="logout()" class="btn-secondary">Sair</button></nav></header>

    <main class="container">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showSection('users')">Alunos</button>
            <button class="tab-btn" onclick="showSection('courses')">Cursos & Aulas</button>
        </div>

        <div id="usersSection" class="admin-section active">
            <div class="admin-grid">
                <div class="glass" style="padding: 40px;">
                    <h3>Novo Aluno</h3>
                    <form id="createUserForm">
                        <input type="text" id="newName" placeholder="Nome" required>
                        <input type="email" id="newEmail" placeholder="E-mail" required>
                        <input type="password" id="newPassword" placeholder="Senha" required>
                        <select id="newRole"><option value="student">Aluno</option><option value="admin">Admin</option></select>
                        <button type="submit" class="btn-primary" style="width: 100%;">Criar</button>
                    </form>
                </div>
                <div class="glass" style="padding: 40px;">
                    <h3>Lista de Alunos</h3>
                    <table><thead><tr><th>Nome</th><th>Status</th><th>Ações</th></tr></thead><tbody id="userList"></tbody></table>
                </div>
            </div>
        </div>

        <div id="coursesSection" class="admin-section">
            <div class="admin-grid">
                <div class="glass" style="padding: 40px;">
                    <h3>Novo Curso</h3>
                    <form id="createCourseForm">
                        <input type="text" id="courseTitleInput" placeholder="Nome do Curso" required>
                        <button type="submit" class="btn-primary" style="width: 100%;">Criar Curso</button>
                    </form>
                    <hr style="opacity: 0.1; margin: 40px 0;">
                    <h3>Matrícula</h3>
                    <form id="enrollForm">
                        <select id="enrollStudent" required></select>
                        <select id="enrollCourse" required></select>
                        <button type="submit" class="btn-primary" style="width: 100%;">Matricular Aluno</button>
                    </form>
                </div>
                <div class="glass" style="padding: 40px;">
                    <h3>Gestão de Conteúdo</h3>
                    <div id="courseManagementList"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function showSection(section) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(section + 'Section').classList.add('active');
            event.target.classList.add('active');
        }

        async function checkAdmin() {
            const res = await fetch('/api/me');
            if (!res.ok) window.location.href = 'login.html';
        }
        checkAdmin();

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const list = document.getElementById('userList');
            const enrollStudent = document.getElementById('enrollStudent');
            list.innerHTML = '';
            enrollStudent.innerHTML = '<option value="">Selecionar Aluno</option>';
            users.forEach(u => {
                if (u.email === 'admin@auraknow.com') return;
                list.innerHTML += `<tr><td>${u.name}</td><td><span class="status-badge ${u.isActive?'status-active':'status-blocked'}">${u.isActive?'Ativo':'Bloq'}</span></td>
                <td><button class="action-btn" onclick="toggleStatus('${u.id}')">Status</button><button class="action-btn danger" onclick="deleteUser('${u.id}')">X</button></td></tr>`;
                enrollStudent.innerHTML += `<option value="${u.id}">${u.name}</option>`;
            });
        }

        async function toggleStatus(userId) { await fetch('/api/admin/toggle-status', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId})}); loadUsers(); }
        async function deleteUser(userId) { if(confirm('Apagar?')) { await fetch('/api/admin/delete-user', {method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId})}); loadUsers(); } }

        document.getElementById('createUserForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/admin/create-user', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:document.getElementById('newName').value, email:document.getElementById('newEmail').value, password:document.getElementById('newPassword').value, role:document.getElementById('newRole').value})});
            loadUsers();
        };

        async function loadCourses() {
            const res = await fetch('/api/courses');
            const courses = await res.json();
            const manageList = document.getElementById('courseManagementList');
            const enrollCourse = document.getElementById('enrollCourse');
            
            manageList.innerHTML = '';
            enrollCourse.innerHTML = '<option value="">Selecionar Curso</option>';

            for (const c of courses) {
                const courseDiv = document.createElement('div');
                courseDiv.className = 'glass';
                courseDiv.style.padding = '20px';
                courseDiv.style.marginBottom = '20px';
                courseDiv.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">
                        <h4 style="margin: 0;">${c.title}</h4>
                        <div>
                            <button class="action-btn success" onclick="openModal('create', null, '${c.id}')">+ Aula</button>
                            <button class="action-btn" onclick="editCourse('${c.id}', '${c.title}')">Renomear</button>
                            <button class="action-btn danger" onclick="deleteCourse('${c.id}')">Apagar</button>
                        </div>
                    </div>
                    <div id="lessons-${c.id}" style="margin-top: 15px;"></div>`;
                manageList.appendChild(courseDiv);
                enrollCourse.innerHTML += `<option value="${c.id}">${c.title}</option>`;

                const lRes = await fetch(`/api/courses/${c.id}/lessons`);
                const lessons = await lRes.json();
                const lContainer = document.getElementById(`lessons-${c.id}`);
                lessons.forEach(l => {
                    const lDiv = document.createElement('div');
                    lDiv.className = 'lesson-list-item';
                    lDiv.innerHTML = `<span>${l.order}. ${l.title}</span>
                        <div>
                            <button class="action-btn" onclick="openModal('edit', '${l.id}', '${c.id}', '${l.title}', '${l.video_url || ''}', \`${l.content || ''}\`, '${l.order}')">Editar</button>
                            <button class="action-btn danger" onclick="deleteLesson('${l.id}')">X</button>
                        </div>`;
                    lContainer.appendChild(lDiv);
                });
            }
        }

        // --- GESTÃO DE MODAL (CRIAÇÃO E EDIÇÃO) ---
        function openModal(mode, lessonId, courseId, title='', url='', content='', order='1') {
            document.getElementById('modalTitle').textContent = mode === 'create' ? 'Nova Aula' : 'Editar Aula';
            document.getElementById('modalLessonId').value = lessonId || '';
            document.getElementById('modalCourseId').value = courseId || '';
            document.getElementById('modalLessonTitle').value = title;
            document.getElementById('modalLessonVideo').value = url;
            document.getElementById('modalLessonContent').value = content;
            document.getElementById('modalLessonOrder').value = order;
            document.getElementById('lessonModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('lessonModal').style.display = 'none'; }

        async function saveLesson() {
            const id = document.getElementById('modalLessonId').value;
            const courseId = document.getElementById('modalCourseId').value;
            const payload = {
                course_id: courseId,
                title: document.getElementById('modalLessonTitle').value,
                video_url: document.getElementById('modalLessonVideo').value,
                content: document.getElementById('modalLessonContent').value,
                order: document.getElementById('modalLessonOrder').value
            };

            const url = id ? `/api/admin/lessons/${id}` : '/api/admin/lessons';
            const method = id ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if(res.ok) { closeModal(); loadCourses(); }
        }

        async function deleteLesson(id) { if(confirm('Apagar aula?')) { await fetch(`/api/admin/lessons/${id}`, { method: 'DELETE' }); loadCourses(); } }
        async function editCourse(id, oldTitle) { const title = prompt('Novo nome:', oldTitle); if (title) { await fetch(`/api/admin/courses/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ title }) }); loadCourses(); } }
        async function deleteCourse(id) { if (confirm('Apagar curso e todas as aulas?')) { await fetch(`/api/admin/courses/${id}`, { method: 'DELETE' }); loadCourses(); } }

        document.getElementById('createCourseForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/admin/courses', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title:document.getElementById('courseTitleInput').value})});
            document.getElementById('createCourseForm').reset();
            loadCourses();
        };

        document.getElementById('enrollForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/admin/enroll', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:document.getElementById('enrollStudent').value, course_id:document.getElementById('enrollCourse').value})});
            if(res.ok) alert('Matriculado!');
        };

        async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href = 'login.html'; }

        loadUsers();
        loadCourses();
    </script>
</body>
</html>
