<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraKnow | Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 100px auto;
            padding: 60px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
        }
        .error-msg {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    
    <div class="container">
        <div class="glass login-container">
            <h2 style="text-align: center; margin-bottom: 40px;">Entrar na Aura<span>Know</span></h2>
            <div id="errorMsg" class="error-msg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Seu E-mail" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Sua Senha" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Acessar Plataforma</button>
            </form>
            <p style="text-align: center; margin-top: 30px; color: var(--text-dim); font-size: 0.9rem;">
                Esqueceu sua senha? <a href="#" style="color: var(--primary);">Suporte</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.role === 'student') {
                        window.location.href = 'area-membros.html';
                    } else {
                        window.location.href = 'admin.html';
                    }
                } else {
                    errorMsg.innerText = data.error || 'Erro ao fazer login';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Erro ao conectar com o servidor';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
